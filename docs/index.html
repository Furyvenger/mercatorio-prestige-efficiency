<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mercatorio — Prestige Efficiency</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Mercatorio — Prestige Efficiency</h1>
    <p>Enter a town ID to load market overview (uses play.mercatorio.io API).</p>
    
    <div>
      <label>Town ID: <input id="townId" value="1"></label>
      <label>API token (optional): <input id="apiToken" type="password" placeholder="paste token for testing"></label>
      <label>Merc User (optional): <input id="apiUser" placeholder="email"></label>
      <label><input id="saveCreds" type="checkbox"> Save credentials to this browser (localStorage)</label>
    </div>
    
    <div class="controls-row" style="margin-top:20px;align-items:center">
      <label>Apprentices: <input id="apprentices" type="number" value="0" min="0" step="1" style="width:4.5rem"></label>
      <button id="loadBtn">Load Market Data</button>
      <button id="computeBtn">Compute Prestige Efficiency</button>
    </div>
    
    <div class="contract-section">
      <h3>Church Contract</h3>
      <div>
        <label>Product: <input id="contractProduct" type="text" placeholder="product name" style="width:140px"></label>
        <label>Amount: <input id="contractAmount" type="number" value="1" min="0.1" step="0.1" style="width:100px"></label>
        <label>Prestige: <input id="contractPrestige" type="number" value="1" min="0" step="0.1" style="width:100px"></label>
        <button id="addContractBtn">Add to Table</button>
        <button id="clearContractsBtn">Clear all</button>
      </div>
    </div>
    
    <div id="status" aria-live="polite"></div>
    
    <div class="legend">
      <strong>Legend:</strong>
      <div class="legend-item">
        <div class="legend-color legend-household"></div>
        <span>Household</span>
      </div>
      <div class="legend-item">
        <div class="legend-color legend-building"></div>
        <span>Building</span>
      </div>
      <div class="legend-item">
        <div class="legend-color legend-contract"></div>
        <span>Church contract</span>
      </div>
    </div>

    <!-- Filters for prestige source types -->
    <div class="filters" style="margin-top:12px;">
      <strong>Filter:</strong>
      <label style="margin-left:8px"><input type="checkbox" id="filterRecipe" checked> Production</label>
      <label style="margin-left:8px"><input type="checkbox" id="filterHousehold" checked> Household</label>
      <label style="margin-left:8px"><input type="checkbox" id="filterBuilding" checked> Building</label>
      <label style="margin-left:8px"><input type="checkbox" id="filterContract" checked> Church contracts</label>
    </div>
    
    <section id="prestigeResults"></section>
    
    <footer>
      <p>Note: If API requests are blocked due to CORS, deploy a server-side proxy or Cloudflare Worker proxy as documented.</p>
    </footer>
  </main>
  <script src="app.js" type="module"></script>
</body>
</html>
