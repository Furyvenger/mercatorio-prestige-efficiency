<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mercatorio — Prestige Efficiency</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Mercatorio — Prestige Efficiency (MVP)</h1>
    <p>Enter a town ID to load market overview (uses play.mercatorio.io API).</p>
    <label>Town ID: <input id="townId" value="1"></label>
    <label>API token (optional): <input id="apiToken" type="password" placeholder="paste token for testing"></label>
    <label>Merc User (optional): <input id="apiUser" placeholder="email"></label>
    <label><input id="saveCreds" type="checkbox"> Save credentials to this browser (localStorage)</label>
    <label><input id="useCache" type="checkbox"> Use cached market data (prefer docs/cache)</label>
    <div>
      <button id="loadBtn">Load Market Data</button>
      <button id="computeBtn">Compute Prestige Efficiency (recipes season 7)</button>
    </div>
    <div id="status" aria-live="polite"></div>
    <section id="output"></section>
    <section id="prestigeResults"></section>
    <footer>
      <p>Note: If API requests are blocked due to CORS, use a proxy or deploy a server-side proxy or Cloudflare Worker proxy as documented.</p>
    </footer>
  </main>
  <script src="app.js" type="module"></script>
</body>
</html>
