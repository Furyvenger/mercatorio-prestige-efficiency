name: Fetch Mercatorio Market Data

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      towns:
        description: 'Space-separated list of town ids (overrides config.json)'
        required: false
        default: ''
  schedule:
    - cron: '0 * * * *' # hourly

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Read config towns
        id: read
        run: python -c "import json,sys;cfg=json.load(open('docs/config.json'));print('\\n'.join(cfg.get('towns', [])))"

      - name: Fetch market data
        env:
          API_BASE: https://play.mercatorio.io/api
          TOKEN: ${{ secrets.MERCATORIO_API_TOKEN }}
          USER: ${{ secrets.MERCATORIO_API_USER }}
        run: |
          mkdir -p docs/cache
          towns_input="${{ github.event.inputs.towns }}"
          if [ -n "$towns_input" ]; then
            towns="$towns_input"
          else
            towns=$(python -c "import json;print(' '.join(json.load(open('docs/config.json')).get('towns',[])))")
          fi
          if [ -z "$towns" ]; then towns="1"; fi
          for id in $towns; do
            url="$API_BASE/towns/$id/marketdata"
            echo "Fetching $url"
            out="docs/cache/town_${id}.json"
            # Use curl to capture HTTP status and log results for debugging
            tmp_out="$out.tmp"
            http_code="000"
            if [ -n "$TOKEN" ] && [ -n "$USER" ]; then
              http_code=$(curl -sS -w "%{http_code}" -H "Authorization: Bearer $TOKEN" -H "X-Merc-User: $USER" "$url" -o "$tmp_out" 2>/dev/null || echo "000")
            elif [ -n "$TOKEN" ]; then
              http_code=$(curl -sS -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$url" -o "$tmp_out" 2>/dev/null || echo "000")
            elif [ -n "$USER" ]; then
              http_code=$(curl -sS -w "%{http_code}" -H "X-Merc-User: $USER" "$url" -o "$tmp_out" 2>/dev/null || echo "000")
            else
              http_code=$(curl -sS -w "%{http_code}" "$url" -o "$tmp_out" 2>/dev/null || echo "000")
            fi
            echo "Fetched HTTP code: $http_code" 
            if [ "$http_code" = "000" ]; then
              echo "curl failed for $url" >&2
              echo '{}' > "$out"
            else
              # Accept 2xx as success
              if [[ "$http_code" == 2* ]]; then
                mv "$tmp_out" "$out"
              else
                echo "Non-2xx response ($http_code) for $url" >&2
                echo '{}' > "$out"
                # also dump response for debugging
                echo "----- response body start -----" >&2
                sed -n '1,200p' "$tmp_out" >&2 || true
                echo "----- response body end -----" >&2
              fi
            fi
            # Wrap/cache
            python .github/scripts/wrap_cache.py "${id}"
          done

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/cache || true
          if git diff --staged --quiet; then echo "No changes to commit"; else git commit -m "Update market cache (GH Action)\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" && git push; fi
