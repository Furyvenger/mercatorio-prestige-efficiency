name: Fetch Mercatorio Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # hourly

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Read config towns
        id: read
        run: |
          python - <<'PY'
import json
cfg=json.load(open('docs/config.json'))
print('\n'.join(cfg.get('towns', [])))
PY

      - name: Fetch market data
        env:
          API_BASE: https://play.mercatorio.io/api
          TOKEN: ${{ secrets.MERCATORIO_API_TOKEN }}
          USER: ${{ secrets.MERCATORIO_API_USER }}
        run: |
          mkdir -p docs/cache
          towns=$(python -c "import json;print(' '.join(json.load(open('docs/config.json')).get('towns',[])))")
          if [ -z "$towns" ]; then towns="1"; fi
          for id in $towns; do
            url="$API_BASE/towns/$id/marketdata"
            echo "Fetching $url"
            out="docs/cache/town_${id}.json"
            # Prefer both headers if available
            if [ -n "$TOKEN" ] && [ -n "$USER" ]; then
              curl -sS -H "Authorization: Bearer $TOKEN" -H "X-Merc-User: $USER" "$url" -o "$out" || echo '{}' > "$out"
            elif [ -n "$TOKEN" ]; then
              curl -sS -H "Authorization: Bearer $TOKEN" "$url" -o "$out" || echo '{}' > "$out"
            elif [ -n "$USER" ]; then
              curl -sS -H "X-Merc-User: $USER" "$url" -o "$out" || echo '{}' > "$out"
            else
              curl -sS "$url" -o "$out" || echo '{}' > "$out"
            fi
            # Wrap with fetched_at timestamp and ensure markets key exists
            python - <<'PY'
import json,datetime,sys
p='docs/cache/town_%s.json' % ("${id}")
try:
    with open(p,'r') as f:
        data=json.load(f)
    # If data already contains markets key, keep as-is; else assume data is markets
    if isinstance(data, dict) and 'markets' in data:
        out={'fetched_at': datetime.datetime.utcnow().isoformat()+'Z', **data}
    else:
        out={'fetched_at': datetime.datetime.utcnow().isoformat()+'Z', 'markets': data}
except Exception as e:
    out={'fetched_at': datetime.datetime.utcnow().isoformat()+'Z', 'markets': {}}
with open(p,'w') as f:
    json.dump(out, f)
PY
          done

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/cache || true
          if git diff --staged --quiet; then echo "No changes to commit"; else git commit -m "Update market cache (GH Action)\\n\\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" && git push; fi
